video:
  video_path: ../../demos/box_proxy_video.mp4
  target_prompt: "A box rests on the wooden desk of a vintage study. Standing behind the table, a person places a hand on the lid and slowly opens it."
  mask_dir: /path/to/your/mask

save_video: outputs/proxyup_box_open.mp4
use_latent_mask: true
flow_shift: 3.0

inversion:
  enable: true
  inverse_prompt: "A proxy video of a box opening."
  num_inverse_step: 40
  num_denoise_step: 40
  inverse_guidance_scale: 1.0
  denoise_guidance_scale: 3.0
  strength: 0.8
  refine_steps: 15

video:
  video_path: ../../demos/stove_proxy_video.mp4
  target_prompt: "In a modern kitchen packed with assorted cookware and utensils, a person crouches in front of the oven. Wearing protective oven mitts, they slowly open the oven door to reveal golden-brown loaves of bread baking inside, with warm interior light spilling out onto the floor."
  mask_dir: /path/to/your/mask

save_video: outputs/proxyup_stove_open.mp4
use_latent_mask: true
flow_shift: 3.0

inversion:
  enable: true
  inverse_prompt: "A proxy video of an oven door opening."
  num_inverse_step: 40
  num_denoise_step: 40
  inverse_guidance_scale: 1.0
  denoise_guidance_scale: 3.0
  strength: 0.8
  refine_steps: 15

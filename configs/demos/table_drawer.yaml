video:
  video_path: ../../demos/table_proxy_video.mp4
  target_prompt: "In a softly lit bedroom, an elegant wooden vanity table stands by the window. A person stands before it, gently sliding open the top drawer with their left hand, revealing neatly arranged makeup essentials, lipsticks, compacts, brushes, and perfume bottles, illuminated by warm ambient light."
  mask_dir: /path/to/your/mask

save_video: outputs/proxyup_table_drawer.mp4
use_latent_mask: true
flow_shift: 3.0

inversion:
  enable: true
  inverse_prompt: "A proxy video of a vanity table drawer opening."
  num_inverse_step: 40
  num_denoise_step: 40
  inverse_guidance_scale: 1.0
  denoise_guidance_scale: 3.0
  strength: 0.8
  refine_steps: 15

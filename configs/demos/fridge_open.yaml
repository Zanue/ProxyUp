video:
  video_path: ../../demos/fridge_proxy_video.mp4
  target_prompt: "In a cozy kitchen, a sleek refrigerator stands against the wall. A person stands before it, gently pulling the door open with one hand, revealing neatly arranged fresh food inside, colorful fruits, beverages, and prepared meals illuminated by the fridge's soft interior light."
  mask_dir: /path/to/your/mask

save_video: outputs/proxyup_fridge_open.mp4
use_latent_mask: true
flow_shift: 3.0

inversion:
  enable: true
  inverse_prompt: "A proxy video of a refrigerator door opening."
  num_inverse_step: 40
  num_denoise_step: 40
  inverse_guidance_scale: 1.0
  denoise_guidance_scale: 3.0
  strength: 0.8
  refine_steps: 15

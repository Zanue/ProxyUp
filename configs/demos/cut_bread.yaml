video:
  video_path: ../../demos/cut_bread_proxy_video.mp4
  target_prompt: "Cinematic shot in a kitchen. Front view of a piece of bread. The bread rests on a wooden table, surrounded by various kitchen utensils. A person stands behind the bread holding a sharp knife. They perform a downward slicing motion through the bread, slide the cut slice away, and repeat this specific sequence three times in a row. Soft natural lighting, 4k resolution."
  mask_dir: /path/to/your/mask

save_video: outputs/proxyup_cut_bread.mp4
use_latent_mask: true
flow_shift: 3.0

inversion:
  enable: true
  inverse_prompt: "A proxy video of bread being sliced."
  num_inverse_step: 40
  num_denoise_step: 40
  inverse_guidance_scale: 1.0
  denoise_guidance_scale: 3.0
  strength: 0.8
  refine_steps: 15
